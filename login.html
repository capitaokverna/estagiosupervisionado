<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>STI Inventory - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#111827;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

.login-card{
    width:420px;
    border:none;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.logo{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#0d6efd;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:2rem;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="card login-card">

    <div class="card-body p-5">

        <div class="text-center mb-4">

            <div class="logo">
                STI
            </div>

            <h3 class="mt-3">
                STI Inventory
            </h3>

            <p class="text-muted">
                Acesse sua conta
            </p>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Usuário
            </label>

            <input
                id="username"
                type="text"
                class="form-control">

        </div>

        <div class="mb-4">

            <label class="form-label">
                Senha
            </label>

            <input
                id="password"
                type="password"
                class="form-control">

        </div>

        <button
            onclick="login()"
            class="btn btn-primary w-100">

            Entrar

        </button>

        <div
            id="message"
            class="mt-3 text-center text-danger">
        </div>

    </div>

</div>

<script src="login.js"></script>

</body>

</html>
