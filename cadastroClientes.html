<!--
    Formulário principal de cadastro de clientes.
    Os campos deste formulário serão enviados para a API
    através da função salvarCliente() definida no clientes.js.
-->
<form id="clienteForm">

<div class="row">

    <!-- Dados básicos do cliente -->

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Razão Social
        </label>

        <input
            id="razao_social"
            type="text"
            class="form-control"
            required>

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">
            CNPJ
        </label>

        <input
            id="cnpj"
            type="text"
            class="form-control"
            required>

    </div>

    <div class="col-md-12 mb-3">

        <label class="form-label">
            Endereço
        </label>

        <input
            id="endereco"
            type="text"
            class="form-control">

    </div>

    <hr class="my-3">

    <!-- Informações do responsável técnico -->

    <h6>Contato Técnico</h6>

    <div class="col-md-4 mb-3">

        <label class="form-label">
            Nome
        </label>

        <input
            id="contato_tecnico_nome"
            type="text"
            class="form-control">

    </div>

    <div class="col-md-4 mb-3">

        <label class="form-label">
            Telefone
        </label>

        <input
            id="contato_tecnico_telefone"
            type="text"
            class="form-control">

    </div>

    <div class="col-md-4 mb-3">

        <label class="form-label">
            E-mail
        </label>

        <input
            id="contato_tecnico_email"
            type="email"
            class="form-control">

    </div>

    <hr class="my-3">

    <!-- Informações do responsável gerencial -->

    <h6>Contato Gerencial</h6>

    <div class="col-md-4 mb-3">

        <label class="form-label">
            Nome
        </label>

        <input
            id="contato_gerencial_nome"
            type="text"
            class="form-control">

    </div>

    <div class="col-md-4 mb-3">

        <label class="form-label">
            Telefone
        </label>

        <input
            id="contato_gerencial_telefone"
            type="text"
            class="form-control">

    </div>

    <div class="col-md-4 mb-3">

        <label class="form-label">
            E-mail
        </label>

        <input
            id="contato_gerencial_email"
            type="email"
            class="form-control">

    </div>

</div>

<!--
    Ações do formulário.
    Salvar envia os dados para a API.
    Limpar remove os dados preenchidos da tela.
-->

<div class="mt-4">

    <button
        type="button"
        class="btn btn-primary"
        onclick="salvarCliente()">

        Salvar Cliente

    </button>

    <button
        type="button"
        class="btn btn-secondary"
        onclick="limparFormulario()">

        Limpar

    </button>

</div>

</form>
